          predicates:
            - Path=${context.path}/presaleActivityReport/**
            - Method=POST,GET
          filters:
            - RewritePath=${context.path}(?<segment>/?.*), $\{segment}

        - id: presales-activity
          uri: lb://presales-activity
          predicates:
            - Path=${context.path}/presaleActivity/**
            - Method=POST,GET
          filters:
            - RewritePath=${context.path}(?<segment>/?.*), $\{segment}

        - id: presales-scheme
