context:
  path: /gateway

spring:
  main:
    banner-mode: off
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-server
          uri: lb://AUTH-SERVER
          predicates:
            - Path=/auth-api/oauth/token,/auth-api/**,/gateway/auth-api/oauth/token,/gateway/auth-api/**
            - Method=POST,GET,DELETE
          filters:
            - RewritePath=/gateway(?<segment>/?.*), $\{segment}

        - id: administration-server
          uri: lb://administration-server
          predicates:
            - Path=${context.path}/administration/**
            - Method=POST,GET
          filters:
            - RewritePath=${context.path}(?<segment>/?.*), $\{segment}

        - id: administration-server-report
          uri: lb://administration-server-report
          predicates:
            - Path=${context.path}/administrationReport/**
            - Method=POST,GET
          filters:
            - RewritePath=${context.path}(?<segment>/?.*), $\{segment}

        - id: common-services
          uri: lb://common-services
          predicates:
            - Path=${context.path}/common/**
            - Method=POST,GET
          filters:
            - RewritePath=${context.path}(?<segment>/?.*), $\{segment}

        - id: presales-enquiry-report
          uri: lb://presales-enquiry-report
          predicates:
            - Path=${context.path}/presaleEnquiryReport/**
            - Method=POST,GET
          filters:
            - RewritePath=${context.path}(?<segment>/?.*), $\{segment}

        - id: presales-enquiry
          uri: lb://presales-enquiry
          predicates:
            - Path=${context.path}/presaleEnquiry/**
