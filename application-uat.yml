spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  security:
    oauth2:
      resource:
        token-info-uri: http://Micro-Auth-Service:9191/auth-api/oauth/check_token
      client:
        client-id: vst-dms-view-client
        client-secret: cnhindglobal

# ── jdbc.* bridge — PersistenceConfiguration uses jdbc.* namespace ────────────
jdbc:
  url: ${spring.datasource.url}
  username: ${spring.datasource.username}
  password: ${spring.datasource.password}
  urlForReports: ${spring.datasource.url}
  usernameForReports: ${spring.datasource.username}
  passwordForReports: ${spring.datasource.password}

# ── security.oauth2.* bridge — old Spring Security OAuth2 namespace ───────────
security:
  oauth2:
    resource:
      token-info-uri: ${spring.security.oauth2.resource.token-info-uri}
    client:
      client-id: ${spring.security.oauth2.client.client-id}
      client-secret: ${spring.security.oauth2.client.client-secret}
  rabbitmq:
    host: localhost       # TODO: update with actual UAT RabbitMQ host
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated   # replaces deprecated publisher-confirms: true
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 100
  mail:
    host: 192.9.200.204
    port: 587
    username: itsupport@vsttillers.com
    password: vst.2017
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

eureka:
  client:
    service-url:
      defaultZone: http://Micro-Eureka-Service:8761/eureka/

file:
  upload-dir:
    Temp: /var/VST-DMS-APPS/FILES/Temp/
    Main: /var/VST-DMS-APPS/FILES/
