# ── jdbc.* bridge — PersistenceConfiguration uses jdbc.* namespace, not spring.datasource.* ──
# All services share the same dev DB via spring.datasource.* above.
# Override jdbc.url in a service-specific *-dev.properties only if that service uses a different DB.
jdbc:
  url: ${spring.datasource.url}
  username: ${spring.datasource.username}
  password: ${spring.datasource.password}
  urlForReports: ${spring.datasource.url}
  usernameForReports: ${spring.datasource.username}
  passwordForReports: ${spring.datasource.password}

# ── security.oauth2.* bridge — old Spring Security OAuth2 namespace ───────────
security:
  oauth2:
    resource:
      token-info-uri: ${spring.security.oauth2.resource.token-info-uri}
    client:
      client-id: ${spring.security.oauth2.client.client-id}
      client-secret: ${spring.security.oauth2.client.client-secret}
