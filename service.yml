server:
  port: 8095
  servlet:
    context-path: /service
    session:
      cookie:
        http-only: true
        secure: false
  error:
    include-message: always
    include-binding-errors: always

spring:
  main:
    banner-mode: off
    allow-circular-references: true
    allow-bean-definition-overriding: true
  session:
    store-type: jdbc
    jdbc:
      table-name: SPRING_SESSION
      initialize-schema: always
  thymeleaf:
    cache: true
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB

file:
  upload-dir:
    SpareTemplate: /var/VST-DMS-APPS/Template/SpareTemplate/
    OldChassisReports: /var/VST-DMS-APPS/OLDCHASSISREPORTS/OldChassis/
    QuotationReports: /var/VST-DMS-APPS/REPORTS/Quotation/
    BookingReports: /var/VST-DMS-APPS/BOOKINGREPORTS/ServiceBooking/
    RequisitionReports: /var/VST-DMS-APPS/REQUISITIONREPORTS/Requisition/
    SpareIssueReports: /var/VST-DMS-APPS/REPORTS/SpareIssue/
    SpareReturnReports: /var/VST-DMS-APPS/REPORTS/SpareReturn/
    RequisitionPrint: /var/VST-DMS-APPS/REPORTS/RequsitonPrint/
    ActivityGstClaimInvPrint: /var/VST-DMS-APPS/REPORTS/ActGstInvClaim/

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: '*'
        exclude: env,beans
  endpoint:
    auditevents:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 160000000
        readTimeout: 160000000
        loggerLevel: BASIC
      postFeignClient:
        loggerLevel: FULL

springdoc:
  version: '@springdoc.version@'
  api-docs:
    path: /api-doc
  swagger-ui:
    path: /swagger-ui-custom.html

logging:
  level:
    root: INFO
    com.hitech: INFO
    org.springframework.security: INFO
    com.netflix.discovery: WARN
    com.netflix.eureka: WARN
    com.sun.jersey: WARN
    org.apache.http: WARN
